<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国近现代史纲要 · 复习题速记</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f6f1e6;
    --paper-deep:#efe7d5;
    --ink:#2a2420;
    --ink-soft:#6b6055;
    --guohong:#9c2e22;
    --guohong-deep:#7a2118;
    --gold:#b8923d;
    --jade:#3f6e5c;
    --jade-soft:#e7efe9;
    --line:#ddd2ba;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 15% 8%, rgba(156,46,34,0.04), transparent 40%),
      radial-gradient(circle at 85% 92%, rgba(184,146,61,0.06), transparent 40%);
    color:var(--ink);
    font-family:"Noto Sans SC", sans-serif;
    font-size:14px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px;}

  /* Header */
  header{
    position:relative;
    padding:34px 28px 26px;
    margin-bottom:22px;
    background:linear-gradient(180deg, var(--guohong) 0%, var(--guohong-deep) 100%);
    color:var(--paper);
    border-radius:4px;
    overflow:hidden;
  }
  header::before{
    content:"";
    position:absolute; inset:0;
    background-image:repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 1px, transparent 1px 40px);
    pointer-events:none;
  }
  header .eyebrow{
    font-size:11.5px; letter-spacing:.28em; text-transform:uppercase;
    color:rgba(246,241,230,0.75); font-weight:500; margin-bottom:8px;
  }
  header h1{
    font-family:"Noto Serif SC", serif;
    font-weight:900;
    font-size:30px;
    margin:0 0 6px;
    letter-spacing:.02em;
  }
  header .sub{
    font-size:13px; color:rgba(246,241,230,0.82);
    display:flex; gap:18px; flex-wrap:wrap; margin-top:14px;
  }
  header .sub b{color:var(--paper); font-weight:700;}
  header .stamp{
    position:absolute; top:22px; right:26px;
    font-family:"Noto Serif SC", serif;
    font-weight:900; font-size:13px;
    color:var(--gold);
    border:2px solid var(--gold);
    border-radius:3px;
    padding:5px 9px;
    letter-spacing:.15em;
    transform:rotate(4deg);
    opacity:.9;
  }

  /* Controls */
  .controls{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom:20px;
  }
  .controls button{
    font-family:"Noto Sans SC",sans-serif;
    font-size:12.5px; font-weight:700;
    background:var(--paper-deep);
    border:1px solid var(--line);
    color:var(--ink);
    padding:7px 14px;
    border-radius:20px;
    cursor:pointer;
    transition:.15s;
  }
  .controls button:hover{background:#fff; border-color:var(--gold);}
  .controls button.primary{
    background:var(--jade); color:#fff; border-color:var(--jade);
  }
  .controls button.primary:hover{background:#365f50;}
  .controls .count{
    margin-left:auto; font-size:12px; color:var(--ink-soft);
  }

  /* Timeline / era sections */
  .timeline{ position:relative; padding-left:26px; }
  .timeline::before{
    content:"";
    position:absolute; left:8px; top:6px; bottom:6px; width:2px;
    background:linear-gradient(180deg, var(--gold), var(--guohong) 50%, var(--jade));
    opacity:.5;
  }
  .era{ position:relative; margin-bottom:30px; }
  .era-head{
    position:relative;
    display:flex; align-items:baseline; gap:10px;
    margin-bottom:12px;
  }
  .era-head::before{
    content:"";
    position:absolute; left:-26px; top:5px;
    width:11px; height:11px; border-radius:50%;
    background:var(--paper);
    border:2.5px solid var(--guohong);
  }
  .era-year{
    font-family:"Noto Serif SC",serif; font-weight:700; font-size:12px;
    color:var(--guohong); background:var(--paper-deep);
    border:1px solid var(--line); padding:2px 8px; border-radius:3px;
    white-space:nowrap;
  }
  .era-title{
    font-family:"Noto Serif SC",serif; font-weight:700; font-size:16.5px;
    color:var(--ink);
  }

  /* Question cards */
  .qlist{ display:flex; flex-direction:column; gap:6px; }
  details.q{
    background:#fffdf8;
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
  }
  details.q[open]{ border-color:var(--gold); box-shadow:0 2px 10px rgba(156,46,34,0.06); }
  details.q summary{
    list-style:none;
    cursor:pointer;
    padding:9px 14px;
    display:flex; align-items:flex-start; gap:10px;
    font-size:13.5px;
  }
  details.q summary::-webkit-details-marker{display:none;}
  .qnum{
    flex:none;
    font-family:"Noto Serif SC",serif; font-weight:700; font-size:12px;
    color:#fff; background:var(--ink-soft);
    width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin-top:1px;
  }
  details.q[open] .qnum{ background:var(--guohong); }
  .qtext{ flex:1; font-weight:500; }
  .caret{ flex:none; color:var(--ink-soft); font-size:11px; margin-top:3px; transition:transform .15s; }
  details.q[open] .caret{ transform:rotate(90deg); color:var(--guohong); }

  .qbody{ padding:2px 14px 12px 46px; }
  .opts{ display:flex; flex-direction:column; gap:4px; margin-bottom:8px; }
  .opt{
    display:flex; gap:8px; font-size:13px; padding:4px 9px;
    border-radius:4px; border:1px solid transparent; color:var(--ink-soft);
  }
  .opt .lab{ flex:none; font-weight:700; color:var(--ink-soft); }
  .opt.correct{
    background:var(--jade-soft); border-color:#c9dcd0; color:var(--ink);
  }
  .opt.correct .lab{ color:var(--jade); }
  .opt.correct::after{ content:"✓"; margin-left:auto; color:var(--jade); font-weight:700; }

  .answer-line{
    font-size:12.5px; color:var(--jade); font-weight:700;
    background:var(--jade-soft); display:inline-block;
    padding:3px 10px; border-radius:20px;
  }

  footer{
    text-align:center; margin-top:34px; font-size:11.5px; color:var(--ink-soft);
  }

  @media print{
    body{background:#fff;}
    header{background:var(--guohong) !important; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
    .controls{display:none;}
    details.q{ break-inside:avoid; }
    details.q .qbody{ display:block !important; }
  }

  @media (max-width:560px){
    header h1{font-size:23px;}
    header .stamp{display:none;}
    .wrap{padding:16px 12px 60px;}
    .timeline{padding-left:18px;}
    .era-head::before{left:-18px;}
  }
</style>
</head>

</div>

  ]},
];

const LABELS = ["A","B","C","D"];
const tl = document.getElementById('timeline');
let total = 0;

DATA.forEach(section=>{
  const eraDiv = document.createElement('div');
  eraDiv.className = 'era';

  const head = document.createElement('div');
  head.className = 'era-head';
  head.innerHTML = `<span class="era-year">${section.year}</span><span class="era-title">${section.era}</span>`;
  eraDiv.appendChild(head);

  const qlist = document.createElement('div');
  qlist.className = 'qlist';

  section.items.forEach(([num, text, opts, correct])=>{
    total++;
    const det = document.createElement('details');
    det.className = 'q';

    const optsHtml = opts.map((o,i)=>{
      const lab = LABELS[i];
      const isCorrect = correct.includes(lab);
      return `<div class="opt${isCorrect?' correct':''}"><span class="lab">${lab}.</span><span>${o}</span></div>`;
    }).join('');

    det.innerHTML = `
      <summary>
        <span class="qnum">${num}</span>
        <span class="qtext">${text}</span>
        <span class="caret">▶</span>
      </summary>
      <div class="qbody">
        <div class="opts">${optsHtml}</div>
        <span class="answer-line">正确答案：${correct.split('').join(' ')}</span>
      </div>
    `;
    qlist.appendChild(det);
  });

  eraDiv.appendChild(qlist);
  tl.appendChild(eraDiv);
});

document.getElementById('cnt').textContent = `共 ${total} 题`;

document.getElementById('toggleAll').addEventListener('click', ()=>{
  document.querySelectorAll('details.q').forEach(d=>d.open = true);
});
document.getElementById('collapseAll').addEventListener('click', ()=>{
  document.querySelectorAll('details.q').forEach(d=>d.open = false);
});
</script>
</body>
